    display: flex; align-items: flex-start; gap: 10px;

  .card:has(.result-page) { padding-top: 0; padding-left: 0; padding-right: 0; padding-bottom: 0; }

  .q-illustration { width: 100%; height: 70px; margin-bottom: 16px; }

    .result-body { padding: 14px 16px 20px; }

    .q-text { font-size: 17px; }

    .intro-title { font-size: 22px; }
    .intro-sub { font-size: 13px; margin-bottom: 20px; }
    .intro-meta { gap: 7px; margin-bottom: 24px; }
    .start-btn { padding: 13px 30px; font-size: 15px; }
    .q-illustration { height: 50px; margin-bottom: 10px; }
  }
</style>
</head>

      "先設定 1–2 個底線條件，比如「不接受制度不透明的公司」",
      "面試時多問一個關於文化的問題，養成習慣而不必全面轉型",
      "遇到職場不適感時，記錄原因，幫助下次選擇時更有依據"
    ],
    quote: "不需要全改變，從一個標準開始就夠了。"
  },
  {
    name: "ESG 觀望型",
    emoji: "👀",
    heroGrad: "linear-gradient(135deg, #7a2800 0%, #b53d10 60%, #d45520 100%)",
    badgeBg: "rgba(234,88,12,0.1)",
    badgeColor: "#9a3412",
    ringColor: "#f97316",
    min: 66, max: 80,
    status: "務實優先，文化是加分項，但你偶爾也會感覺哪裡不太對。",
    features: ["工作優先，價值觀其次", "對公司文化較被動接受", "實際條件是主要篩選標準"],
    strategy: [
      "下次面試多加一個問題：「公司如何處理員工反映的問題？」",
      "不必全面改變，但多了解一點資訊，決策就能更全面",
      "觀察入職後的第一個月，留意制度與承諾是否一致"
    ],
    quote: "務實沒有錯，但資訊更多，選擇才會更好。"
  },
  {
    name: "ESG 起步型",
    emoji: "🔵",
    heroGrad: "linear-gradient(135deg, #1e3a5f 0%, #2d5a8e 60%, #3d74ad 100%)",
    badgeBg: "rgba(45,125,111,0.1)",
    badgeColor: "#1c4f48",
    ringColor: "#4a9e8e",
    min: 81, max: 100,
    status: "你目前以穩定就業為優先，ESG 還不在你的求職雷達上。",
    features: ["先找到工作是當前目標", "對 ESG 概念接觸較少", "判斷標準主要是實際條件"],
    strategy: [
      "先穩定，再升級——進入職場後開始留意公司的治理方式與文化",
      "觀察身邊同事的工作狀態，是否有明顯過勞或不公平跡象",
      "了解 ESG 基本概念，讓下一份工作的選擇比這次多一個維度"
    ],
    quote: "今天的起點，不代表明天的終點。"
  }
];

// ── STATE ──────────────────────────────────────────────────────────────────────
let current = -1; // -1 = intro
let answers = [];
let isAnimating = false;

// ── PARTICLES ──────────────────────────────────────────────────────────────────
function initParticles() {
  const wrap = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      --drift: ${(Math.random()-0.5)*80}px;
      animation-duration: ${6+Math.random()*10}s;
      animation-delay: ${Math.random()*8}s;
      width: ${2+Math.random()*3}px;
      height: ${2+Math.random()*3}px;
    `;
    wrap.appendChild(p);
  }
}

// ── PROGRESS ───────────────────────────────────────────────────────────────────
function updateProgress(idx) {
  const wrap = document.getElementById('progress-wrap');
  if (idx < 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  document.getElementById('progress-fill').style.width = `${((idx+1)/10)*100}%`;
  const row = document.getElementById('dots-row');
  if (!row.children.length) {
    for (let i = 0; i < 10; i++) {
      const d = document.createElement('div'); d.className = 'dot'; row.appendChild(d);
    }
  }
  Array.from(row.children).forEach((d, i) => {
    d.className = 'dot' + (i < idx ? ' answered' : i === idx ? ' current' : '');
  });
}

// ── RENDER INTRO ───────────────────────────────────────────────────────────────
function renderIntro() {
  const card = document.getElementById('main-card');
  card.className = 'card';
  card.innerHTML = `
    <div class="intro-page">
      <div class="intro-title">我與 ESG 的距離</div>
      <p class="intro-sub">請不要選「覺得應該如何」，<br>而是選「平常真的會怎麼做」</p>
      <div class="intro-meta">
        <span class="intro-meta-item">📋 共 10 題</span>
        <span class="intro-meta-item">⏱ 約 3–5 分鐘</span>
      </div>
      <svg class="q-illustration" viewBox="0 0 500 70" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#f5faf9;stop-opacity:0"/>
            <stop offset="25%" style="stop-color:#2d7d6f;stop-opacity:0.25"/>
            <stop offset="75%" style="stop-color:#4a9e8e;stop-opacity:0.25"/>
            <stop offset="100%" style="stop-color:#f5faf9;stop-opacity:0"/>
          </linearGradient>
        </defs>
        <path d="M0,35 Q50,12 100,35 T200,35 T300,35 T400,35 T500,35" fill="none" stroke="url(#ig)" stroke-width="1.5"/>
        <circle cx="100" cy="35" r="3.5" fill="#2d7d6f" opacity="0.45"/>
        <circle cx="200" cy="35" r="3.5" fill="#4a9e8e" opacity="0.45"/>
        <circle cx="300" cy="35" r="3.5" fill="#2d7d6f" opacity="0.45"/>
        <circle cx="400" cy="35" r="3.5" fill="#4a9e8e" opacity="0.45"/>
        <text x="87" y="26" fill="rgba(45,125,111,0.35)" font-size="8" font-family="sans-serif" font-weight="600">E</text>
        <text x="197" y="26" fill="rgba(45,125,111,0.35)" font-size="8" font-family="sans-serif" font-weight="600">S</text>
        <text x="297" y="26" fill="rgba(45,125,111,0.35)" font-size="8" font-family="sans-serif" font-weight="600">G</text>
      </svg>
      <button class="start-btn" onclick="startQuiz()">
        開始測驗 →
      </button>
    </div>
  `;
}

// ── RENDER QUESTION ────────────────────────────────────────────────────────────
function renderQuestion(idx) {
  const q = questions[idx];
  const card = document.getElementById('main-card');
  card.innerHTML = `
    <div class="q-badge"><span class="q-badge-dot"></span>${q.icon} ${q.category}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">
      ${q.options.map(o => `
        <button class="option" onclick="selectAnswer('${o.letter}', this)">
          <span class="option-letter">${o.letter}</span>
          <span>${o.text}</span>
        </button>
      `).join('')}
    </div>
  `;
}

// ── SELECT ANSWER ──────────────────────────────────────────────────────────────
function selectAnswer(letter, btn) {
  if (isAnimating) return;
  isAnimating = true;

  // visual feedback
  btn.classList.add('selected');

  const score = scores[letter];
  answers.push(score);

  setTimeout(() => {
    const card = document.getElementById('main-card');
    card.classList.add('exit');
    setTimeout(() => {
      card.classList.remove('exit');
      if (answers.length >= 10) {
        showResult();
      } else {
        current++;
        updateProgress(current);
        renderQuestion(current);
        isAnimating = false;
      }
    }, 250);
  }, 280);
}

// ── START ──────────────────────────────────────────────────────────────────────
function startQuiz() {
  if (isAnimating) return;
  isAnimating = true;
  document.querySelector('.container').classList.remove('is-result');
  window.scrollTo({ top: 0, behavior: 'instant' });
  const card = document.getElementById('main-card');
  card.classList.add('exit');
  setTimeout(() => {
    card.classList.remove('exit');
    current = 0;
    updateProgress(0);
    renderQuestion(0);
    isAnimating = false;
  }, 250);
}

// ── RESULT ─────────────────────────────────────────────────────────────────────
function showResult() {
  const total = answers.reduce((a, b) => a + b, 0);
  const pct = ((total - 25) / 75) * 100;
  const lvl = levels.find(l => pct <= l.max) || levels[levels.length - 1];

  document.getElementById('progress-wrap').style.opacity = '0';
  setTimeout(() => { document.getElementById('progress-wrap').style.display = 'none'; }, 500);

  // Mark container for result top-spacing
  document.querySelector('.container').classList.add('is-result');
  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const card = document.getElementById('main-card');
  card.innerHTML = `
    <div class="result-page">

      <div class="result-hero" style="background:${lvl.heroGrad}">
        <div class="result-hero-top">
          <span class="result-type-label">測驗結果</span>
          <span class="result-pct-chip">已靠近 ESG ${Math.round(100 - pct)}%</span>
        </div>
        <div class="result-hero-body">
          <span class="result-emoji-large">${lvl.emoji}</span>
          <div class="result-title">${lvl.name}</div>
        </div>
        <div class="result-quote">${lvl.quote}</div>
      </div>

      <div class="result-body">
        <div class="result-section">
          <div class="result-section-label">階段性現況</div>
          <div class="result-section-text">${lvl.status}</div>
          <div class="result-tags">
            ${lvl.features.map(f => `<span class="result-tag">${f}</span>`).join('')}
          </div>
        </div>

        <div class="result-section">
          <div class="result-section-label">求職策略</div>
          <ul class="strategy-list">
            ${lvl.strategy.map((s, i) => `
              <li>
                <span class="strategy-bullet">${i + 1}</span>
                <span>${s}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      </div>

    </div>
  `;
  isAnimating = false;
}

// ── RESET ──────────────────────────────────────────────────────────────────────
function resetQuiz() {
  if (isAnimating) return;
  isAnimating = true;
  answers = [];
  current = -1;
  const card = document.getElementById('main-card');
  const pw = document.getElementById('progress-wrap');
  pw.style.opacity = '';
  pw.style.display = 'none';
  document.getElementById('dots-row').innerHTML = '';
  card.classList.add('exit');
  setTimeout(() => {
    card.classList.remove('exit');
    renderIntro();
    isAnimating = false;
  }, 250);
}

// ── INIT ───────────────────────────────────────────────────────────────────────
initParticles();
renderIntro();
</script>
</body>
</html>
