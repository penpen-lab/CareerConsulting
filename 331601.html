
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職場倫理潛力測驗</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .progress-container { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: #4CAF50; border-radius: 5px; transition: 0.3s; }
        .question { display: none; }
        .question.active { display: block; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white; transition: 0.2s; }
        button:hover { background: #e8f5e9; border-color: #4CAF50; }
        #result-page { display: none; text-align: center; }
        .dimension-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .dimension-box { background: #f9f9f9; padding: 10px; border-radius: 8px; border-left: 4px solid #4CAF50; }
    </style>
</head>
<body>

<div class="card">
    <div id="quiz-ui">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="quiz-container">
            </div>
    </div>

    <div id="result-page">
        <h2>測驗結果：<span id="total-score"></span> 分</h2>
        <div class="dimension-grid" id="dimension-results"></div>
        <hr>
        <h3>職場潛力分析</h3>
        <p id="potential-analysis"></p>
        <button onclick="location.reload()" style="margin-top:20px; background:#4CAF50; color:white;">重新測驗</button>
    </div>
</div>

<script>
    const questions = [
        { q: "當發現工作流程有漏洞時，我會主動回報而非私下利用。", cat: "誠實誠信" },
        { q: "我認為在公務報帳時，絕對不應包含個人私人開支。", cat: "誠實誠信" },
        { q: "即使沒有人監督，我也會準時完成被交辦的任務。", cat: "責任感" },
        { q: "當工作出現失誤時，我會先尋求補救而非推卸責任。", cat: "責任感" },
        { q: "我願意在必要時為了團隊目標調整個人工作節奏。", cat: "責任感" },
        { q: "我會尊重同事的不同意見，即時與我的想法分歧。", cat: "人際尊重" },
        { q: "我不會在背後散布關於同事或主管的負面傳聞。", cat: "人際尊重" },
        { q: "在職場溝通中，我能保持禮貌並體諒他人難處。", cat: "人際尊重" },
        { q: "處理公司資源分配時，我能確保程序公開且透明。", cat: "公平公正" },
        { q: "評估績效或推薦人選時，我能排除個人私交影響。", cat: "公平公正" }
    ];

    const options = ["非常不同意", "不同意", "普通", "同意", "非常同意"];
    let currentIdx = 0;
    let scores = [];
    let catScores = {};

    function initQuiz() {
        const container = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            let div = document.createElement('div');
            div.className = `question ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `<h3>Q${i+1}. ${q.q}</h3><div class="options">` + 
                options.map((opt, val) => `<button onclick="next(${val + 1}, '${q.cat}')">${opt}</button>`).join('') + `</div>`;
            container.appendChild(div);
        });
        updateProgress();
    }

    function updateProgress() {
        document.getElementById('progress-bar').style.width = ((currentIdx / questions.length) * 100) + '%';
    }

    window.next = function(value, category) {
        scores.push(value);
        catScores[category] = (catScores[category] || 0) + value;
        
        document.querySelectorAll('.question')[currentIdx].classList.remove('active');
        currentIdx++;

        if (currentIdx < questions.length) {
            document.querySelectorAll('.question')[currentIdx].classList.add('active');
            updateProgress();
        } else {
            showResults();
        }
    };

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        
        const total = scores.reduce((a, b) => a + b, 0);
        document.getElementById('total-score').innerText = total;

        const dimResult = document.getElementById('dimension-results');
        for (let cat in catScores) {
            dimResult.innerHTML += `<div class="dimension-box"><strong>${cat}</strong><br>得分：${catScores[cat]}</div>`;
        }

        let analysis = "";
        if (total >= 40) analysis = "具備卓越的道德直覺與領導潛力，能成為團隊的信任基石，在複雜環境中仍能堅守原則，展現高度專業。";
        else if (total >= 30) analysis = "倫理意識良好，能兼顧個人利益與組織規範，適應力強，是職場中穩定且可靠的核心成員。";
        else analysis = "目前處於倫理磨合期，建議多觀察組織文化與規章，建立更清晰的行為準則以提升職場信任度與職涯廣度。";
        
        document.getElementById('potential-analysis').innerText = analysis;
    }

    initQuiz();
</script>

</body>
</html>
