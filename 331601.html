
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職場倫理潛力評估</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #10b981;
            --bg: #f8fafc;
            --text: #1e293b;
        }
        body { font-family: 'Segoe UI', Microsoft JhengHei, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 550px; }
        
        /* 進度條 */
        .progress-wrapper { margin-bottom: 30px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; color: #64748b; }
        .progress-bg { background: #e2e8f0; height: 8px; border-radius: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: 0.4s; }

        .question-box { display: none; transition: 0.3s; }
        .question-box.active { display: block; }
        h2 { font-size: 1.4rem; margin-bottom: 25px; line-height: 1.4; }

        /* 按鈕選項 */
        .options { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { 
            padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px; cursor: pointer; 
            background: white; font-size: 1rem; text-align: left; transition: all 0.2s; color: #475569;
        }
        .opt-btn:hover { border-color: var(--primary); background: #f5f3ff; color: var(--primary); transform: translateX(5px); }

        /* 結果頁面 */
        #result-page { display: none; text-align: center; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--secondary); display: flex; flex-direction: column; justify-content: center; margin: 0 auto 20px; }
        .score-num { font-size: 2.5rem; font-weight: bold; color: var(--primary); }
        
        .ethics-icons { display: flex; justify-content: space-around; margin: 30px 0; padding: 20px; background: #f8fafc; border-radius: 15px; }
        .icon-item { font-size: 0.8rem; color: #64748b; }
        .icon-item span { display: block; font-size: 1.8rem; margin-bottom: 5px; }

        .analysis-text { line-height: 1.6; padding: 15px; background: #f0fdf4; border-radius: 10px; color: #166534; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <div class="progress-wrapper">
            <div class="progress-info"><span id="q-count">第 1 題</span><span>總計 10 題</span></div>
            <div class="progress-bg"><div id="progress-fill"></div></div>
        </div>
        <div id="quiz-content"></div>
    </div>

    <div id="result-page">
        <h3>測驗報告分析</h3>
        <div class="score-circle">
            <span class="score-num" id="total-score">0</span>
            <span style="font-size:0.8rem; color:#94a3b8">總得分</span>
        </div>
        
        <div class="ethics-icons">
            <div class="icon-item"><span>🛡️</span>誠實誠信</div>
            <div class="icon-item"><span>⚖️</span>公平公正</div>
            <div class="icon-item"><span>🤝</span>人際尊重</div>
            <div class="icon-item"><span>✅</span>責任擔當</div>
        </div>

        <p class="analysis-text" id="potential-analysis"></p>
        <button onclick="location.reload()" style="margin-top:30px; border:none; background:var(--primary); color:white; padding:12px 30px; border-radius:10px; cursor:pointer;">重新檢測</button>
    </div>
</div>

<script>
    const questions = [
        "面對利益誘惑時，我能堅持誠實的原則。",
        "在處理公務流程中，我會主動揭露潛在的利益衝突。",
        "處理團隊資源時，我能做到透明化且不偏袒特定對象。",
        "對於職場中的決策，我會以公眾利益為優先考量。",
        "面對溝通衝突時，我能保持客觀禮貌的態度。",
        "我會主動協助同事解決問題，並維護工作氣氛。",
        "即使在沒有監督的情況下，我也能按時高品質交付任務。",
        "當任務出現疏失時，我會主動承擔責任並修正。",
        "我遵守公司的資訊安全規範，不私自傳播內部機密。",
        "我對待實習生或基層夥伴，能保持與高層一致的尊重。"
    ];

    const freqOptions = [
        { label: "經常這麼做", val: 5 },
        { label: "大多數時候如此", val: 4 },
        { label: "偶爾如此", val: 3 },
        { label: "很少這麼做", val: 2 },
        { label: "從不這麼做", val: 1 }
    ];

    let currentIdx = 0;
    let totalScore = 0;

    function renderQuestion() {
        const container = document.getElementById('quiz-content');
        container.innerHTML = `
            <div class="question-box active">
                <h2>${questions[currentIdx]}</h2>
                <div class="options">
                    ${freqOptions.map(opt => `<button class="opt-btn" onclick="handleSelect(${opt.val})">${opt.label}</button>`).join('')}
                </div>
            </div>
        `;
        document.getElementById('q-count').innerText = `第 ${currentIdx + 1} 題`;
        document.getElementById('progress-fill').style.width = ((currentIdx / questions.length) * 100) + '%';
    }

    window.handleSelect = function(val) {
        totalScore += val;
        currentIdx++;
        if (currentIdx < questions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    };

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-page').style.display = 'block';
        document.getElementById('total-score').innerText = totalScore;

        let analysis = "";
        if (totalScore >= 45) analysis = "您展現了卓越的道德自律與領導特質，能成為團隊的核心價值支柱，並在變動環境中引領正向風氣。";
        else if (totalScore >= 35) analysis = "倫理意識穩定且行為可靠，能兼顧目標與規範，是企業中極具信賴度的核心人才，潛力卓越。";
        else analysis = "建議進一步強化職場規範的理解，透過情境練習提升倫理決策的敏感度，將有助於開拓更廣闊的職涯機會。";
        
        document.getElementById('potential-analysis').innerText = analysis;
    }

    renderQuestion();
</script>

</body>
</html>
