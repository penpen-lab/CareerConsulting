<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>溝通風格小遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --card-shadow: 0 8px 40px rgba(0,0,0,0.13);
    --accent1: #FF6B6B;
    --accent2: #FFD93D;
    --accent3: #6BCB77;
    --accent4: #4D96FF;
    --radius: 24px;
    --font-display: 'Fredoka One', 'Noto Sans TC', sans-serif;
    --font-body: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #ffe0b2 0%, #ffd6e7 40%, #d4f0ff 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    padding: 16px;
  }
  .stage {
    width: 100%;
    max-width: 420px;
    position: relative;
  }
  .card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 32px 24px 28px;
    display: none;
    position: relative;
    overflow: hidden;
  }
  .card.active {
    display: block;
    animation: cardIn 0.28s cubic-bezier(.25,.8,.25,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* ── COVER ── */
  #cover {
    text-align: center;
    background: linear-gradient(160deg, #fff7ee 0%, #fff 100%);
    border-top: 6px solid var(--accent1);
  }
  .cover-emoji { font-size: 64px; margin-bottom: 8px; display: block; animation: bounce 2s infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .cover-title {
    font-family: var(--font-display);
    font-size: 28px;
    color: #333;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .cover-subtitle { font-size: 13px; color: #999; margin-bottom: 24px; }
  .cover-lines { margin-bottom: 28px; }
  .cover-lines p {
    font-size: 15px;
    color: #555;
    line-height: 2;
  }
  .cover-lines p span { font-size: 17px; }
  .btn-start {
    background: linear-gradient(90deg, #FF6B6B, #FF8E53);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 18px;
    font-family: var(--font-display);
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(255,107,107,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    display: block;
    width: 100%;
    margin-top: 4px;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,107,0.4); }
  .time-hint { font-size: 12px; color: #bbb; margin-top: 10px; }
  /* ── QUESTION ── */
  .q-card { border-top: 6px solid var(--accent4); }
  .progress-bar-wrap {
    width: 100%;
    height: 6px;
    background: #f0f0f0;
    border-radius: 99px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4D96FF, #6BCB77);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .q-num {
    background: #4D96FF;
    color: #fff;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 12px;
    font-family: var(--font-display);
  }
  .q-scene { font-size: 12px; color: #aaa; }
  .q-text {
    font-size: 17px;
    font-weight: 700;
    color: #222;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .opt-btn {
    background: #f7f7fb;
    border: 2px solid #ebebf5;
    border-radius: 16px;
    padding: 12px 10px;
    font-size: 13px;
    color: #333;
    cursor: pointer;
    text-align: center;
    line-height: 1.45;
    transition: all 0.18s;
    font-family: var(--font-body);
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
  }
  .opt-btn:hover {
    background: #eef4ff;
    border-color: #4D96FF;
    color: #4D96FF;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(77,150,255,0.18);
  }
  .opt-btn.selected {
    background: #4D96FF;
    border-color: #4D96FF;
    color: #fff;
    transform: scale(0.97);
  }
  /* ── RESULT ── */
  #result { border-top: 6px solid #FFD93D; text-align: center; transition: background 0.4s; }
  #result.bg-rational   { background: linear-gradient(160deg, #dbeafe 0%, #eff6ff 100%); border-top-color: #4D96FF; }
  #result.bg-caring     { background: linear-gradient(160deg, #fce7f3 0%, #fff0f7 100%); border-top-color: #E91E8C; }
  #result.bg-cautious   { background: linear-gradient(160deg, #ede9fe 0%, #f5f3ff 100%); border-top-color: #7C3AED; }
  #result.bg-fastpace   { background: linear-gradient(160deg, #fee2e2 0%, #fff5f5 100%); border-top-color: #EF4444; }
  #result.bg-action     { background: linear-gradient(160deg, #ffedd5 0%, #fffbf0 100%); border-top-color: #F59E0B; }
  #result.bg-friendly   { background: linear-gradient(160deg, #dcfce7 0%, #f0fdf4 100%); border-top-color: #16A34A; }
  #result.bg-emotional  { background: linear-gradient(160deg, #fce7f3 0%, #fff0fa 100%); border-top-color: #DB2777; }
  #result.bg-expressive { background: linear-gradient(160deg, #cffafe 0%, #f0fdff 100%); border-top-color: #0891B2; }
  #result.bg-rational   .result-section { background: rgba(77,150,255,0.10); }
  #result.bg-caring     .result-section { background: rgba(233,30,140,0.09); }
  #result.bg-cautious   .result-section { background: rgba(124,58,237,0.09); }
  #result.bg-fastpace   .result-section { background: rgba(239,68,68,0.09);  }
  #result.bg-action     .result-section { background: rgba(245,158,11,0.11); }
  #result.bg-friendly   .result-section { background: rgba(22,163,74,0.10);  }
  #result.bg-emotional  .result-section { background: rgba(219,39,119,0.09); }
  #result.bg-expressive .result-section { background: rgba(8,145,178,0.10);  }
  #result.bg-rational   .trait-card { background: rgba(77,150,255,0.13);  }
  #result.bg-caring     .trait-card { background: rgba(233,30,140,0.11);  }
  #result.bg-cautious   .trait-card { background: rgba(124,58,237,0.11);  }
  #result.bg-fastpace   .trait-card { background: rgba(239,68,68,0.11);   }
  #result.bg-action     .trait-card { background: rgba(245,158,11,0.13);  }
  #result.bg-friendly   .trait-card { background: rgba(22,163,74,0.12);   }
  #result.bg-emotional  .trait-card { background: rgba(219,39,119,0.11);  }
  #result.bg-expressive .trait-card { background: rgba(8,145,178,0.12);   }
  .result-crown { font-size: 52px; margin-bottom: 4px; display: block; animation: spin 1.2s cubic-bezier(.34,1.56,.64,1); }
  @keyframes spin { from{transform:rotate(-30deg) scale(0.5)} to{transform:rotate(0deg) scale(1)} }
  .result-label {
    font-size: 13px;
    color: #888;
    letter-spacing: 2px;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .result-type-name {
    font-family: var(--font-display);
    font-size: 30px;
    border-radius: 12px;
    display: inline-block;
    padding: 6px 22px;
    margin: 6px 0 18px;
    color: #fff;
  }
  .result-section {
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 12px;
    text-align: left;
  }
  .result-section-title {
    font-size: 13px;
    font-weight: 700;
    color: #888;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-section-text {
    font-size: 15px;
    color: #333;
    line-height: 1.7;
    font-weight: 500;
  }
  .traits-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .trait-card {
    flex: 1;
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .trait-icon { font-size: 26px; display: block; margin-bottom: 6px; }
  .trait-text { font-size: 12px; color: #444; line-height: 1.5; font-weight: 500; }
  .color-rational   { background: linear-gradient(135deg,#4D96FF,#2563EB); }
  .color-caring     { background: linear-gradient(135deg,#FF8FAB,#E91E8C); }
  .color-cautious   { background: linear-gradient(135deg,#A78BFA,#7C3AED); }
  .color-fastpace   { background: linear-gradient(135deg,#FF6B6B,#EF4444); }
  .color-action     { background: linear-gradient(135deg,#FF9F43,#F59E0B); }
  .color-friendly   { background: linear-gradient(135deg,#6BCB77,#16A34A); }
  .color-emotional  { background: linear-gradient(135deg,#FF6B9D,#DB2777); }
  .color-expressive { background: linear-gradient(135deg,#20D6B5,#0891B2); }
  .deco {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
    pointer-events: none;
  }
  .deco1 { width:80px;height:80px;background:#FF6B6B;top:-20px;right:-20px; }
  .deco2 { width:50px;height:50px;background:#FFD93D;bottom:20px;left:-15px; }
  @media (max-width:360px) {
    .opt-btn { font-size:12px; padding:10px 7px; min-height:64px; }
    .q-text { font-size:15px; }
  }
</style>
</head>
<body>
<div class="stage">

    </div>
    <button class="btn-start" onclick="startQuiz()">開始測驗 🚀</button>
    <div class="time-hint">⏱ 大約 1 分鐘</div>
  </div>
  <div class="card" id="result"></div>
</div>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let scores = {};
let currentQ = 0;

function startQuiz() {
  Object.keys(STYLES).forEach(k => scores[k] = 0);
  buildQuestions();
  showCard('q0');
}

function buildQuestions() {
  const stage = document.querySelector('.stage');
  QUESTIONS.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card q-card';
    card.id = 'q' + i;
    const pct = Math.round((i / QUESTIONS.length) * 100);
    const shuffledOpts = shuffle(q.options);
    const opts = shuffledOpts.map(o =>
      `<button class="opt-btn" onclick="answer('${o.key}', ${i}, this)">${o.text}</button>`
    ).join('');
    card.innerHTML = `
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="q-meta">
        <span class="q-num">${i+1} / ${QUESTIONS.length}</span>
        <span class="q-scene">${q.scene}</span>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="options-grid">${opts}</div>
    `;
    stage.insertBefore(card, document.getElementById('result'));
  });
}

function answer(styleKey, qIdx, btn) {
  if (btn.classList.contains('selected')) return;
  btn.classList.add('selected');
  scores[styleKey]++;
  setTimeout(() => {
    if (qIdx + 1 < QUESTIONS.length) {
      showCard('q' + (qIdx + 1));
    } else {
      showResult();
    }
  }, 180);
}

function showCard(id) {
  const current = document.querySelector('.card.active');
  const target = document.getElementById(id);

  if (current && current !== target) {
    current.classList.remove('active');
    current.style.display = 'none';
  }

  target.style.display = 'block';
  // Force reflow so animation triggers fresh
  target.classList.remove('active');
  void target.offsetWidth;
  target.classList.add('active');

  window.scrollTo({top:0, behavior:'smooth'});
}

function showResult() {
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const topKey = sorted[0][0];
  const style = STYLES[topKey];
  const data  = RESULT_DATA[topKey];
  const traitsHTML = data.traits.map(t => `
    <div class="trait-card">
      <span class="trait-icon">${t.icon}</span>
      <div class="trait-text">${t.text}</div>
    </div>
  `).join('');
  const resultEl = document.getElementById('result');
  resultEl.className = resultEl.className.replace(/bg-\w+/g, '').trim();
  resultEl.classList.add('bg-' + topKey);
  resultEl.innerHTML = `
    <span class="result-crown">${style.emoji}</span>
    <div class="result-label">主溝通風格</div>
    <div class="result-type-name ${style.colorClass}">${style.name}</div>
    <div class="result-section">
      <div class="result-section-title">✨ 優勢</div>
      <div class="result-section-text">${data.strength}</div>
    </div>
    <div class="result-section">
      <div class="result-section-title">🔦 盲點</div>
      <div class="result-section-text">${data.blind}</div>
    </div>
    <div class="result-section-title" style="margin:16px 0 8px;font-size:14px;font-weight:700;color:#555;">🏢 職場特質</div>
    <div class="traits-row">${traitsHTML}</div>
  `;
  showCard('result');
  launchConfetti();
}

function launchConfetti() {
  const existing = document.getElementById('confetti-canvas');
  if (existing) existing.remove();
  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const COLORS = [
    '#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF8FAB',
    '#A78BFA','#FF9F43','#20D6B5','#FF6B9D','#FFF176','#80DEEA','#CE93D8'
  ];
  const SHAPES = ['rect','circle','ribbon'];
  const pieces = [];
  for (let i = 0; i < 140; i++) {
    pieces.push({
      x:       Math.random() * canvas.width,
      y:       -20 - Math.random() * canvas.height * 0.65,
      w:       6 + Math.random() * 9,
      h:       8 + Math.random() * 11,
      color:   COLORS[Math.floor(Math.random() * COLORS.length)],
      shape:   SHAPES[Math.floor(Math.random() * SHAPES.length)],
      angle:   Math.random() * Math.PI * 2,
      spin:    (Math.random() - 0.5) * 0.2,
      vx:      (Math.random() - 0.5) * 2.4,
      vy:      2.0 + Math.random() * 3.8,
      alpha:   1,
      wobble:  Math.random() * Math.PI * 2,
    });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = 0;
    for (const p of pieces) {
      p.wobble += 0.05;
      p.x += p.vx + Math.sin(p.wobble) * 0.7;
      p.y += p.vy;
      p.vy += 0.04;
      p.angle += p.spin;
      if (p.y > canvas.height * 0.72) p.alpha -= 0.026;
      if (p.alpha <= 0) continue;
      alive++;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'ribbon') {
        ctx.beginPath();
        ctx.moveTo(-p.w/2, -p.h/2);
        ctx.quadraticCurveTo(p.w/2, 0, -p.w/2, p.h/2);
        ctx.quadraticCurveTo(p.w*0.2, 0, -p.w/2, -p.h/2);
        ctx.fill();
      } else {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      }
      ctx.restore();
    }
    frame++;
    if (alive > 0 && frame < 300) requestAnimationFrame(draw);
    else canvas.remove();
  }
  draw();
}
